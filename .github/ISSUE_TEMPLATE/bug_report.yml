name: Bug Report
description: Signaler un bug dans NeuralES
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour signaler un bug.

  - type: dropdown
    id: component
    attributes:
      label: Composant concerné
      options:
        - Backend (FastAPI)
        - Frontend Web (Vue 3)
        - Desktop (Tauri)
        - Desktop (PyQt)
        - Script de démarrage
        - Tunnel SSH / Base de données
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      placeholder: Décris clairement le comportement observé.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      placeholder: |
        - OS : Windows 11
        - Python : 3.11
        - Node : 20
        - Navigateur : Chrome 124
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: text
    validations:
      required: false
