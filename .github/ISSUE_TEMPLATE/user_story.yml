name: User Story
description: Décrire une fonctionnalité du point de vue utilisateur
labels: ["user-story"]
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      placeholder: "En tant que [médecin / technicien / admin], je veux [action] afin de [bénéfice]."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Critères d'acceptation (DoD)
      placeholder: |
        - [ ] Critère 1
        - [ ] Critère 2
        - [ ] Tests passants
    validations:
      required: true

  - type: dropdown
    id: estimation
    attributes:
      label: Estimation (story points)
      options:
        - "1"
        - "2"
        - "3"
        - "5"
        - "8"
        - "13"
    validations:
      required: false

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint cible
      options:
        - Sprint 1 — Auth & Infrastructure
        - Sprint 2 — Gestion patients
        - Sprint 3 — Acquisition EEG
        - Sprint 4 — Analytics & Dashboard
        - Sprint 5 — Desktop & offline
        - Backlog
    validations:
      required: false
