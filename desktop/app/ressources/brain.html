<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0F172A; overflow: hidden; }
  canvas { display: block; }

  #tooltip {
    position: absolute;
    background: rgba(15,23,42,0.92);
    color: #F1F5F9;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 12px;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
  }

  #legend {
    position: absolute;
    bottom: 10px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: opacity 0.3s;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 11px;
    color: #94A3B8;
  }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  #counter {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(15,23,42,0.85);
    color: #94A3B8;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 11px;
  }

  #topo-legend {
    position: absolute;
    bottom: 10px;
    left: 10px;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  #topo-legend .tl-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 11px;
    color: #94A3B8;
  }
  #topo-scale {
    width: 120px;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #22C55E, #F59E0B, #EF4444);
    border: 1px solid #334155;
  }
  #topo-score {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15,23,42,0.85);
    color: #F1F5F9;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 6px 16px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 600;
    display: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="tooltip"></div>
<div id="counter">0 électrode(s)</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#475569"></div>Inactif</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div>Sélectionné</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22C55E"></div>Actif — OK</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>Actif — Alerte</div>
  <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div>Actif — Fatigue</div>
</div>

<div id="topo-legend">
  <div class="tl-row"><span>0</span><div id="topo-scale"></div><span>100</span></div>
  <div class="tl-row" style="justify-content:center;">Score de fatigue</div>
</div>

<div id="topo-score">— / 100</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "/vendor/three.module.js",
    "three/addons/": "/vendor/"
  }
}
</script>

<script type="module">
import * as THREE       from 'three';
import { GLTFLoader }    from 'three/addons/GLTFLoader.js';
import { OrbitControls } from 'three/addons/OrbitControls.js';
console.log('Three.js r' + THREE.REVISION);

// ── Couleurs ──
const C = {
  inactive: new THREE.Color(0x475569),
  selected: new THREE.Color(0x3B82F6),
  ok:       new THREE.Color(0x22C55E),
  warn:     new THREE.Color(0xF59E0B),
  danger:   new THREE.Color(0xEF4444),
};

function scoreToColor(score) {
  if (score === undefined || score === null) return C.inactive.clone();
  if (score < 40)  return C.ok.clone();
  if (score < 70)  return C.warn.clone();
  return C.danger.clone();
}

// ── État ──
const selected       = new Set();
const scores         = {};
const byElec         = {};   // nom → electrode mesh (helmet mode)
const topoBlobs      = {};   // nom → blob mesh (topo mode)
const topoPositions  = {};   // nom → Vector3 (position mondiale)
const helmetMeshes   = [];   // meshes du casque (hors electrodes)
const brainMeshes    = [];   // meshes du cerveau
const spheres        = [];   // pour raycasting helmet mode
let   currentMode    = 'helmet';

const counter   = document.getElementById('counter');
const tooltip   = document.getElementById('tooltip');
const topoScore = document.getElementById('topo-score');
const legend    = document.getElementById('legend');
const topoLeg   = document.getElementById('topo-legend');

function updateCounter() {
  counter.textContent = `${selected.size} électrode(s)`;
}

function sphereColor(name) {
  const isSelected = selected.has(name);
  const s = scores[name];
  if (!isSelected) return C.inactive;
  if (s === undefined) return C.selected;
  return scoreToColor(s);
}

function refreshHelmetElectrode(name) {
  const m = byElec[name];
  if (!m) return;
  const col = sphereColor(name);
  m.material.color.copy(col);
  m.material.emissive.copy(col);
  m.material.emissiveIntensity = selected.has(name) ? 0.55 : 0.08;
  m.scale.setScalar(selected.has(name) ? 1.4 : 1.0);
}

function refreshTopoBlob(name) {
  const b = topoBlobs[name];
  if (!b) return;
  const s = scores[name];
  const col = scoreToColor(s);
  b.material.color.copy(col);
  b.material.emissive.copy(col);
  b.material.emissiveIntensity = s !== undefined ? 0.6 : 0.2;
  const scale = s !== undefined ? 0.7 + (s / 100) * 1.3 : 0.7;
  b.scale.setScalar(scale);
}

function updateTopoVertexColors() {
  const elecList = Object.entries(topoPositions);
  if (!elecList.length) return;

  brainMeshes.forEach((mesh) => {
    const geo = mesh.geometry;
    if (!geo.attributes.position) return;
    const posAttr = geo.attributes.position;
    const n = posAttr.count;

    if (!geo.attributes.color) {
      geo.setAttribute('color',
        new THREE.BufferAttribute(new Float32Array(n * 3), 3));
    }
    const colorAttr = geo.attributes.color;
    const worldPos  = new THREE.Vector3();
    const vLocal    = new THREE.Vector3();

    for (let i = 0; i < n; i++) {
      vLocal.fromBufferAttribute(posAttr, i);
      mesh.localToWorld(worldPos.copy(vLocal));

      let sumW = 0, r = 0, g = 0, b = 0;
      for (const [name, ep] of elecList) {
        const d  = worldPos.distanceTo(ep);
        const w  = 1 / Math.max(d * d, 0.0001);
        const c  = scoreToColor(scores[name]);
        r += c.r * w; g += c.g * w; b += c.b * w;
        sumW += w;
      }
      colorAttr.setXYZ(i, r / sumW, g / sumW, b / sumW);
    }
    colorAttr.needsUpdate       = true;
    mesh.material.vertexColors  = true;
    mesh.material.needsUpdate   = true;
  });
}

function computeAvgScore() {
  const vals = Object.values(scores).filter(v => v !== undefined);
  if (!vals.length) return null;
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
}

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Scène ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0F172A);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.2, 250);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.target.set(0, -50, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(1, 2, 1.5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8FB8FF, 0.35);
fill.position.set(-1, -0.5, -1);
scene.add(fill);

// ── Chargement GLB ──
new GLTFLoader().load('/casque_brain_electrodes.glb', (gltf) => {
  const model = gltf.scene;
  model.position.y -= 50;
  scene.add(model);

  const helmetMat = new THREE.MeshStandardMaterial({
    color: 0x4b6bff, metalness: 0.4, roughness: 0.35,
  });

  const blobGeo = new THREE.SphereGeometry(6, 16, 16);

  model.traverse((child) => {
    if (!child.isMesh) return;

    if (child.name === 'Casque') {
      child.material = helmetMat;
      helmetMeshes.push(child);
      return;
    }

    if (child.name.startsWith('Electrode_')) {
      const elec = child.name.replace('Electrode_', '');
      const mat = new THREE.MeshStandardMaterial({
        color: C.inactive.clone(), emissive: C.inactive.clone(),
        emissiveIntensity: 0.1, metalness: 0.2, roughness: 0.4,
      });
      child.material = mat;
      child.userData.electrode = elec;
      byElec[elec] = child;
      spheres.push(child);

      // Stocker la position mondiale pour le mode topo
      const wp = new THREE.Vector3();
      child.getWorldPosition(wp);
      topoPositions[elec] = wp.clone();

      // Créer un blob topo (invisible par défaut)
      const blobMat = new THREE.MeshStandardMaterial({
        color: C.inactive.clone(), emissive: C.inactive.clone(),
        emissiveIntensity: 0.2, transparent: true, opacity: 0.75,
        metalness: 0.1, roughness: 0.3,
      });
      const blob = new THREE.Mesh(blobGeo, blobMat);
      blob.position.copy(wp);
      blob.visible = false;
      scene.add(blob);
      topoBlobs[elec] = blob;
      return;
    }

    // Tout autre mesh = cerveau
    brainMeshes.push(child);
  });

  console.log(`Chargé — ${spheres.length} électrodes, ${brainMeshes.length} meshes cerveau`);
  controls.update();
}, undefined, (err) => console.error('GLB error:', err));

// ── Raycasting (helmet uniquement) ──
const ray   = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('mousemove', (e) => {
  if (currentMode !== 'helmet') return;
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(spheres);
  if (hits.length) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 30) + 'px';
    tooltip.textContent = hits[0].object.userData.electrode;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', (e) => {
  if (currentMode !== 'helmet') return;
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(spheres);
  if (!hits.length) return;
  const elec = hits[0].object.userData.electrode;
  if (selected.has(elec)) selected.delete(elec); else selected.add(elec);
  refreshHelmetElectrode(elec);
  updateCounter();
  if (window._bridge) {
    window._bridge.on_electrode_click(
      JSON.stringify({ electrode: elec, active: [...selected] })
    );
  }
});

// ── API Python → JS ──
window.setElectrodeScore = (name, score) => {
  scores[name] = score;
  refreshHelmetElectrode(name);
  refreshTopoBlob(name);
  if (currentMode === 'topo') {
    const avg = computeAvgScore();
    topoScore.textContent = avg !== null ? `Fatigue moy. : ${avg} / 100` : '— / 100';
    updateTopoVertexColors();
  }
};

window.setAllScores = (scoresObj) => {
  Object.entries(scoresObj).forEach(([k, v]) => { scores[k] = v; });
  if (currentMode === 'helmet') {
    Object.keys(scoresObj).forEach(refreshHelmetElectrode);
  } else {
    Object.keys(scoresObj).forEach(refreshTopoBlob);
    const avg = computeAvgScore();
    topoScore.textContent = avg !== null ? `Fatigue moy. : ${avg} / 100` : '— / 100';
    updateTopoVertexColors();
  }
};

window.setMode = (mode) => {
  currentMode = mode;
  const isHelmet = mode === 'helmet';

  // Helm meshes
  helmetMeshes.forEach(m => m.visible = isHelmet);
  // Electrode meshes (small, raycasting)
  spheres.forEach(s => s.visible = isHelmet);
  // Topo blobs
  Object.values(topoBlobs).forEach(b => b.visible = !isHelmet);
  // Brain meshes always visible but different material
  brainMeshes.forEach(m => {
    m.visible = true;
    if (!isHelmet) {
      if (!m._origMat) m._origMat = m.material;
      m.material = new THREE.MeshStandardMaterial({
        vertexColors: true,
        metalness: 0.1, roughness: 0.6,
      });
    } else {
      if (m._origMat) { m.material = m._origMat; m._origMat = null; }
    }
  });

  // UI
  legend.style.display    = isHelmet ? 'flex' : 'none';
  topoLeg.style.display   = isHelmet ? 'none' : 'flex';
  topoScore.style.display = isHelmet ? 'none' : 'block';
  counter.style.display   = isHelmet ? 'block' : 'none';
  tooltip.style.display   = 'none';

  if (!isHelmet) {
    updateTopoVertexColors();
    Object.keys(topoBlobs).forEach(refreshTopoBlob);
    const avg = computeAvgScore();
    topoScore.textContent = avg !== null ? `Fatigue moy. : ${avg} / 100` : '— / 100';
  }
};

window.selectElectrode = (name, on) => {
  if (on) selected.add(name); else selected.delete(name);
  refreshHelmetElectrode(name);
  updateCounter();
};

window.clearElectrodes = () => {
  selected.clear();
  Object.keys(byElec).forEach(refreshHelmetElectrode);
  updateCounter();
};

// ── QWebChannel ──
if (typeof QWebChannel !== 'undefined') {
  new QWebChannel(qt.webChannelTransport, (ch) => {
    window._bridge = ch.objects.bridge;
  });
}

// ── Render loop ──
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
