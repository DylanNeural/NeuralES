name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────
  #  Backend — lint + type check
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Lint with ruff
        run: ruff check backend/app --output-format=github

      - name: Type check with mypy
        run: mypy backend/app --ignore-missing-imports --no-error-summary
        continue-on-error: true

  # ──────────────────────────────────────────────
  #  Frontend — type check + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Vue 3 / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neurales-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: neurales-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + production bundle)
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_WS_BASE_URL: ws://localhost:8000
